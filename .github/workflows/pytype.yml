name: Pytype

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    pytype:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                python-version: [
                    "3.12"
                ]

        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  version: "latest"
                  enable-cache: true

            - name: Set up Python ${{ matrix.python-version }}
              run: uv python install ${{ matrix.python-version }}

            - name: Install dependencies
              run: |
                  sed -i 's/>=3.13/>=3.12/g' pyproject.toml
                  uv sync --python ${{ matrix.python-version }}
                  uv pip install pytype ".[all]"

            - name: Run pytype
              run: |
                  uv run pytype geemap/ --disable import-error,pyi-error
