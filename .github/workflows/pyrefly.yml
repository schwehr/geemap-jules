name: Pyrefly

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    pyrefly:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                python-version: [
                    "3.13"
                ]

        steps:
            - uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  version: "latest"
                  enable-cache: true

            - name: Set up Python ${{ matrix.python-version }}
              run: uv python install ${{ matrix.python-version }}

            - name: Install dependencies
              run: |
                  uv sync --python ${{ matrix.python-version }}
                  uv pip install pyrefly

            - name: Run pyrefly
              continue-on-error: true
              run: |
                  uv run pyrefly check $(git ls-files '*.py')
